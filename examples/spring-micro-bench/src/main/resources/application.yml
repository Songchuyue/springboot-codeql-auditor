server:
  port: 18080

spring:
  servlet:
    multipart:
      enabled: true
  datasource:
    url: jdbc:h2:mem:benchdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:/mapper/*.xml
